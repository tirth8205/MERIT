name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Metrics (new metric or improvement)
        - Models (new model adapter)
        - Datasets (new benchmark)
        - Reporting (tables, plots, export)
        - CLI
        - Other
    validations:
      required: true
